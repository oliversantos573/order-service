name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build com Maven
        working-directory: ./service
        run: mvn clean install -DskipTests

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1

      - name: Login ECR
        run: |
          aws ecr get-login-password --region sa-east-1 | \
          docker login --username AWS --password-stdin 111204669352.dkr.ecr.sa-east-1.amazonaws.com

      - name: Build Docker
        working-directory: ./service
        run: docker build -t order-service .

      - name: Push Docker
        run: |
          docker tag order-service:latest 111204669352.dkr.ecr.sa-east-1.amazonaws.com/order-service:latest
          docker push 111204669352.dkr.ecr.sa-east-1.amazonaws.com/order-service:latest

  terraform:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: ./service/infra

      - name: Terraform Apply
        working-directory: ./service/infra
        run: terraform apply -auto-approve
